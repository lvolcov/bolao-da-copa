<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="./luto.js?v=4"></script>
  <title>Bolão · Chaveamento</title>
  <script src="./diag.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],display:["'Plus Jakarta Sans'","sans-serif"]}}}};</script>
  <style>body{font-family:Inter,sans-serif}.font-display{font-family:'Plus Jakarta Sans',sans-serif}</style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6">
    <nav id="vnav" class="mb-5 flex flex-wrap gap-2 text-xs font-semibold"></nav>
    <header class="rounded-3xl border border-slate-800 bg-gradient-to-br from-slate-900 to-slate-900/40 px-6 py-8">
      <p class="text-[0.7rem] font-bold uppercase tracking-[0.25em] text-emerald-400">Mata-mata</p>
      <h1 class="mt-1 font-display text-3xl font-extrabold tracking-tight sm:text-4xl">Chaveamento 🗺️</h1>
      <p class="mt-2 max-w-2xl text-sm text-slate-400">
        Fases com palpites mostram os <b class="text-emerald-300">votos reais</b> (✅ = confronto decidido).
        A fase seguinte é a <b class="text-amber-300">projeção</b> <i>se cada favorito avançar</i>;
        daí em diante, a definir. Arraste para o lado →
      </p>
    </header>
    <div id="bracket" class="mt-6 flex items-stretch gap-3 overflow-x-auto pb-4"></div>
    <footer class="mt-8 text-center text-xs text-slate-500">Bolão da Pelada MCR</footer>
  </div>

  <script src="./data.js"></script>
  <script src="./common.js"></script>
  <script>
    const { K, renderNav, crest, crestOf, fmtKick } = BOLAO;
    renderNav("vnav");

    const hasPicks = (s) => K.players.some(p => (s.picks[p] || []).some(Boolean));
    // quem avança de um confronto: vencedor real se decidido, senão a maioria dos votos
    const advance = (m) => m.winner || (m.tallyA >= m.tallyB ? m.a : m.b);

    const el = document.getElementById("bracket");
    const colWrap = (label, sub, cards, accent) =>
      `<div class="flex w-44 shrink-0 flex-col">
        <div class="mb-2 text-center">
          <h3 class="font-display text-xs font-bold uppercase tracking-wider ${accent}">${label}</h3>
          ${sub ? `<p class="text-[0.6rem] text-slate-600">${sub}</p>` : ""}
        </div>
        <div class="flex flex-1 flex-col justify-around gap-2">${cards}</div>
      </div>`;

    // --- coluna com votos reais (fase que já tem palpites) ---
    const teamRow = (name, crestUrl, votes, tot, hi, isWinner, isLoser) => {
      const pct = tot ? Math.round(votes / tot * 100) : 0;
      return `<div class="relative flex items-center gap-1.5 overflow-hidden rounded-md px-2 py-1.5 ${hi ? "bg-emerald-500/15" : ""}">
          <div class="absolute inset-y-0 left-0 ${hi ? "bg-emerald-500/15" : "bg-slate-700/20"}" style="width:${pct}%"></div>
          ${crest(crestUrl, "h-5 w-5")}
          <span class="relative flex-1 truncate text-xs font-semibold ${hi ? "text-emerald-200" : isLoser ? "text-slate-600 line-through decoration-slate-700" : "text-slate-500"}">${isWinner ? "✅ " : ""}${name}</span>
          <span class="relative text-[0.7rem] font-bold tabular-nums ${hi ? "text-emerald-300" : "text-slate-600"}">${votes}</span>
        </div>`;
    };
    const realCards = (s) => s.matches.map((m, i) => {
      const tot = m.tallyA + m.tallyB, decided = !!m.winner;
      const aHi = decided ? m.winner === m.a : m.tallyA >= m.tallyB;
      return `<div data-st="${s.key}" data-mi="${i}" tabindex="0" class="cursor-pointer rounded-xl border ${decided ? "border-emerald-500/40" : "border-slate-800"} bg-slate-900 p-1.5 transition hover:border-emerald-400/60 focus:outline-none focus:ring-1 focus:ring-emerald-500/50">
          ${teamRow(m.a, m.crestA, m.tallyA, tot, aHi, decided && m.winner === m.a, decided && m.winner !== m.a)}
          ${teamRow(m.b, m.crestB, m.tallyB, tot, !aHi, decided && m.winner === m.b, decided && m.winner !== m.b)}
          ${m.date ? `<div class="px-2 pt-0.5 text-center text-[0.55rem] text-slate-600">${fmtKick(m.date)}</div>` : ""}
        </div>`;
    }).join("");

    // --- coluna de projeção: pares de quem avança da fase anterior ---
    const projCards = (prev) => {
      const adv = prev.matches.map(advance), cards = [];
      const row = (t) => `<div class="flex items-center gap-1.5 rounded-md px-2 py-1.5">
          ${crest(crestOf(t), "h-5 w-5")}
          <span class="flex-1 truncate text-xs font-semibold text-slate-300">${t}</span>
        </div>`;
      for (let i = 0; i < adv.length; i += 2)
        cards.push(`<div class="rounded-xl border border-dashed border-amber-500/40 bg-amber-500/5 p-1.5">
            ${row(adv[i])}
            <div class="my-0.5 text-center text-[0.6rem] font-bold uppercase tracking-wider text-amber-500/60">vs</div>
            ${row(adv[i + 1])}
          </div>`);
      return cards.join("");
    };

    // --- colunas ainda indefinidas ---
    const tbd = (n) => Array.from({ length: n }, () =>
      `<div class="flex flex-col items-center justify-center gap-1 rounded-xl border border-dashed border-slate-700/60 bg-slate-900/40 px-2 py-4 text-center">
        <span class="text-lg opacity-40">⚽</span>
        <span class="text-[0.65rem] font-medium text-slate-600">a definir</span>
      </div>`).join("");
    const champ = `<div class="flex flex-col items-center justify-center gap-1 rounded-xl border border-dashed border-amber-500/40 bg-amber-500/5 px-2 py-5 text-center">
        <span class="text-2xl">🏆</span>
        <span class="text-[0.65rem] font-bold uppercase tracking-wide text-amber-300">Campeão</span>
        <span class="text-[0.6rem] text-slate-600">sai daqui</span>
      </div>`;

    el.innerHTML = K.stages.map((s, idx) => {
      const prev = K.stages[idx - 1];
      if (hasPicks(s)) return colWrap(s.label, `+${s.weight} por acerto · votos reais · toque pra ver`, realCards(s), "text-emerald-300");
      if (prev && hasPicks(prev)) return colWrap(s.label, `+${s.weight} por acerto · projeção`, projCards(prev), "text-amber-300");
      if (s.key === "final") return colWrap(s.label, `campeão vale +${s.weight}`, champ, "text-slate-500");
      return colWrap(s.label, `+${s.weight} por acerto · a definir`, tbd(s.matches.length), "text-slate-500");
    }).join("");

    // ---- tooltip de votos (hover no desktop, toque no celular) ----
    const tip = document.createElement("div");
    tip.className = "pointer-events-none fixed z-50 hidden w-64 rounded-2xl border border-slate-700 bg-slate-900/95 p-3 shadow-2xl shadow-black/50 backdrop-blur";
    document.body.appendChild(tip);

    const stByKey = Object.fromEntries(K.stages.map(s => [s.key, s]));
    const col = (name, crestUrl, votes, backers, hi, isWinner) => {
      const names = backers.length
        ? backers.map(p => `<li class="truncate text-[0.7rem] ${hi ? "text-emerald-300" : "text-slate-400"}">${p}</li>`).join("")
        : `<li class="text-[0.7rem] text-slate-600">ninguém</li>`;
      return `<div class="min-w-0 flex-1">
          <div class="mb-1 flex items-center gap-1">${crest(crestUrl, "h-4 w-4")}<span class="truncate text-xs font-bold ${hi ? "text-emerald-300" : "text-slate-300"}">${isWinner ? "✅ " : ""}${name}</span></div>
          <div class="mb-1 text-[0.65rem] font-semibold ${hi ? "text-emerald-400" : "text-slate-500"}">${votes} voto${votes === 1 ? "" : "s"}</div>
          <ul class="space-y-0.5">${names}</ul>
        </div>`;
    };

    function fill(card) {
      const s = stByKey[card.dataset.st], m = s.matches[+card.dataset.mi];
      const decided = !!m.winner;
      const aHi = decided ? m.winner === m.a : m.tallyA >= m.tallyB;
      tip.innerHTML = `<div class="flex gap-3">
          ${col(m.a, m.crestA, m.tallyA, m.backA || [], aHi, decided && m.winner === m.a)}
          <div class="w-px shrink-0 bg-slate-700"></div>
          ${col(m.b, m.crestB, m.tallyB, m.backB || [], !aHi, decided && m.winner === m.b)}
        </div>`;
    }
    function place(card) {
      const r = card.getBoundingClientRect(), w = 256, gap = 10;
      let left = r.left + r.width / 2 - w / 2;
      left = Math.max(8, Math.min(left, innerWidth - w - 8));
      tip.style.left = left + "px";
      const h = tip.offsetHeight;
      tip.style.top = (r.top - h - gap >= 8 ? r.top - h - gap : r.bottom + gap) + "px";
    }
    let pinned = null;
    const show = (card) => { fill(card); tip.classList.remove("hidden"); place(card); };
    const hide = () => { tip.classList.add("hidden"); pinned = null; };

    el.querySelectorAll("[data-st]").forEach(card => {
      card.addEventListener("mouseenter", () => { if (!pinned) show(card); });
      card.addEventListener("mouseleave", () => { if (!pinned) hide(); });
      card.addEventListener("focus", () => show(card));
      card.addEventListener("blur", () => { if (!pinned) hide(); });
      card.addEventListener("click", (e) => {
        e.stopPropagation();
        if (pinned === card) { hide(); } else { pinned = card; show(card); }
      });
    });
    document.addEventListener("click", hide);
    addEventListener("scroll", hide, true);
  </script>
</body>
</html>
